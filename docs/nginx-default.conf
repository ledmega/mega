# ============================================================================
# mega-webserver nginx reverse proxy 설정
#
# 네트워크 구성:
#   외부(공인IP):59890  →  미니PC 192.168.0.77:80  →  Spring Boot :8080
#   외부(공인IP):56989  →  미니PC 192.168.0.77:443  (현재 미사용)
#
# Spring Boot는 호스트에서 직접 실행 중 (비Docker)
# Docker nginx → 호스트 Spring Boot 접근: 172.17.0.1 (docker0 게이트웨이)
# ============================================================================

# WebSocket Upgrade 헤더 매핑
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name _;   # 모든 호스트명/IP 허용

    # 클라이언트 요청 크기 제한 (파일 업로드 등)
    client_max_body_size 50m;

    # ── 프록시 공통 설정 ──────────────────────────────────────────────────
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # WebSocket 지원 (Spring Boot STOMP)
    proxy_http_version 1.1;
    proxy_set_header Upgrade    $http_upgrade;
    proxy_set_header Connection $connection_upgrade;

    proxy_read_timeout 60s;
    proxy_send_timeout 60s;

    # ── Spring Boot 전체 프록시 ───────────────────────────────────────────
    # 172.17.0.1 = Docker 브리지 게이트웨이 = 호스트(미니PC) 자신
    location / {
        proxy_pass http://172.17.0.1:8080;
    }
}
