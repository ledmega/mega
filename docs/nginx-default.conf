# ============================================================================
# mega-webserver nginx reverse proxy 설정
#
# 네트워크 구성:
#   외부(공인IP):59890  →  미니PC:80    → HTTP → HTTPS 리다이렉트
#   외부(공인IP):56989  →  미니PC:443   → mega  Spring Boot :8080 (HTTPS)
#   외부(공인IP):18789  →  미니PC:18790 → openclaw 컨테이너 :18789 (HTTPS)
#
# SSL: 자체 서명 인증서 (/home/a86223/nginx/ssl/)
# Docker nginx → 호스트/컨테이너 접근: 172.17.0.1 (docker0 게이트웨이)
# ============================================================================

# WebSocket Upgrade 헤더 매핑
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# ── HTTP(80): HTTPS로 리다이렉트 ──────────────────────────────────────────────
server {
    listen 80;
    server_name _;
    return 301 https://$http_host$request_uri;
}

# ── HTTPS(443): mega Spring Boot 프록시 ──────────────────────────────────────
server {
    listen 443 ssl;
    server_name _;

    ssl_certificate     /etc/nginx/ssl/server.crt;
    ssl_certificate_key /etc/nginx/ssl/server.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    client_max_body_size 50m;

    proxy_set_header Host              $http_host;
    proxy_set_header X-Forwarded-Host  $http_host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_http_version 1.1;
    proxy_set_header Upgrade    $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_read_timeout 60s;
    proxy_send_timeout 60s;

    location / {
        proxy_pass http://172.17.0.1:8080;
    }
}

# ── HTTPS(18791): openclaw 프록시 ─────────────────────────────────────────────
# iptime 포트포워딩: 외부:18789 → 미니PC:18791
# (openclaw 컨테이너가 18789-18790 점유 중이므로 nginx는 18791로 수신)
server {
    listen 18791 ssl;
    server_name _;

    ssl_certificate     /etc/nginx/ssl/server.crt;
    ssl_certificate_key /etc/nginx/ssl/server.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    client_max_body_size 50m;

    proxy_set_header Host              $http_host;
    proxy_set_header X-Forwarded-Host  $http_host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_http_version 1.1;
    proxy_set_header Upgrade    $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_read_timeout 60s;
    proxy_send_timeout 60s;

    location / {
        proxy_pass http://172.17.0.1:18789;
    }
}
