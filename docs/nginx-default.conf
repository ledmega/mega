# ============================================================================
# mega-webserver nginx reverse proxy 설정
#
# 네트워크 구성:
#   외부(공인IP):59890  →  미니PC 192.168.0.77:80   → HTTP → HTTPS 리다이렉트
#   외부(공인IP):56989  →  미니PC 192.168.0.77:443  → Spring Boot :8080 (HTTPS)
#
# SSL: 자체 서명 인증서 (/home/a86223/nginx/ssl/)
# Docker nginx → 호스트 Spring Boot 접근: 172.17.0.1 (docker0 게이트웨이)
# ============================================================================

# WebSocket Upgrade 헤더 매핑
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# ── HTTP: HTTPS로 리다이렉트 ──────────────────────────────────────────────────
server {
    listen 80;
    server_name _;

    # 모든 HTTP 요청을 HTTPS(56989 외부포트)로 리다이렉트
    return 301 https://$http_host$request_uri;
}

# ── HTTPS: Spring Boot 프록시 ─────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name _;

    # ── SSL 인증서 ────────────────────────────────────────────────────────────
    ssl_certificate     /etc/nginx/ssl/server.crt;
    ssl_certificate_key /etc/nginx/ssl/server.key;

    # 보안 권장 SSL 설정
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # 클라이언트 요청 크기 제한
    client_max_body_size 50m;

    # ── 프록시 공통 설정 ──────────────────────────────────────────────────────
    proxy_set_header Host              $http_host;
    proxy_set_header X-Forwarded-Host  $http_host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;

    # WebSocket 지원 (Spring Boot STOMP)
    proxy_http_version 1.1;
    proxy_set_header Upgrade    $http_upgrade;
    proxy_set_header Connection $connection_upgrade;

    proxy_read_timeout 60s;
    proxy_send_timeout 60s;

    # ── Spring Boot 전체 프록시 ───────────────────────────────────────────────
    # 172.17.0.1 = Docker 브리지 게이트웨이 = 호스트(미니PC) 자신
    location / {
        proxy_pass http://172.17.0.1:8080;
    }
}
