// 웹서버 모듈 빌드 설정

plugins {
	id 'org.springframework.boot' version '3.5.5'
	id 'io.spring.dependency-management' version '1.1.7'
}

java {
	toolchain {
		languageVersion = JavaLanguageVersion.of(21)
	}
}

configurations {
	compileOnly {
		extendsFrom annotationProcessor
	}
}

dependencies {
	// [REACTIVE] spring-boot-starter-web → spring-boot-starter-webflux
	implementation 'org.springframework.boot:spring-boot-starter-webflux'
	// [REACTIVE] spring-boot-starter-data-jpa → spring-boot-starter-data-r2dbc + r2dbc-mariadb
	implementation 'org.springframework.boot:spring-boot-starter-data-r2dbc'
	implementation 'org.mariadb:r2dbc-mariadb:1.2.2'
	// [REMOVED] spring-boot-starter-web-services (서블릿 기반 웹서비스 → WebFlux 불필요)
	// [REMOVED] spring-boot-starter-websocket    (STOMP/SockJS → SSE로 교체)
	// [REMOVED] mybatis-spring-boot-starter      (JPA와 함께 제거)

	implementation 'org.springframework.boot:spring-boot-starter-security'
	implementation 'org.springframework.boot:spring-boot-starter-thymeleaf'
	implementation 'org.springframework.boot:spring-boot-starter-validation'
	implementation 'org.thymeleaf.extras:thymeleaf-extras-springsecurity6'
	// [KEPT] JDBC 드라이버 - DatabaseInitializer가 DriverManager로 직접 사용
	implementation 'org.mariadb.jdbc:mariadb-java-client:3.4.1'
	compileOnly 'org.projectlombok:lombok'
	annotationProcessor 'org.projectlombok:lombok'
	testImplementation 'org.springframework.boot:spring-boot-starter-test'
	testImplementation 'org.springframework.security:spring-security-test'
	testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}

tasks.named('test') {
	useJUnitPlatform()
}

// bootRun 시 테스트 건너뛰기 (빌드 속도 향상)
tasks.named('bootRun') {
	dependsOn = ['classes']
	// JVM 인코딩 설정 (한글 로그 출력을 위해)
	jvmArgs = ['-Dfile.encoding=UTF-8', '-Duser.language=ko', '-Duser.country=KR']
}

