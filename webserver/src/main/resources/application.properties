spring.application.name=mega

# 인프라 설정
server.forward-headers-strategy=framework

# 데이터베이스
spring.r2dbc.url=${MEGA_R2DBC_URL:r2dbc:mariadb://localhost:33306/ledmega}
spring.r2dbc.username=${MEGA_DB_USER:ledmega}
spring.r2dbc.password=${MEGA_DB_PASSWORD:}
spring.datasource.url=${MEGA_DB_URL:jdbc:mariadb://localhost:33306/ledmega?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=utf8mb4&serverTimezone=Asia/Seoul}
spring.datasource.username=${MEGA_DB_USER:ledmega}
spring.datasource.password=${MEGA_DB_PASSWORD:}

# [Spring AI - Gemini AI Settings]
# 보안을 위해 실제 키는 환경 변수(GEMINI_API_KEY)로 관리합니다.
spring.ai.openai.api-key=${GEMINI_API_KEY:}
spring.ai.openai.base-url=https://generativelanguage.googleapis.com
spring.ai.openai.chat.options.model=gemini-1.5-flash

# 사용하지 않는 OpenAI 자동설정 비활성화 (부팅 에러 방지)
spring.ai.openai.embedding.enabled=false
spring.ai.openai.image.enabled=false
spring.ai.openai.audio.transcription.enabled=false
spring.ai.openai.audio.speech.enabled=false
spring.ai.openai.moderation.enabled=false

# 기타 자동설정 관리
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration,org.springframework.ai.autoconfigure.openai.OpenAiAutoConfiguration
