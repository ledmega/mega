spring.application.name=mega

# 리버스 프록시(nginx) 뒤에서 X-Forwarded-* 헤더 신뢰
server.forward-headers-strategy=framework

# [REACTIVE] R2DBC 연결 설정
spring.r2dbc.url=${MEGA_R2DBC_URL:r2dbc:mariadb://localhost:33306/ledmega}
spring.r2dbc.username=${MEGA_DB_USER:ledmega}
spring.r2dbc.password=${MEGA_DB_PASSWORD:}

# [KEPT] JDBC URL
spring.datasource.url=${MEGA_DB_URL:jdbc:mariadb://localhost:33306/ledmega?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=utf8mb4&serverTimezone=Asia/Seoul}
spring.datasource.username=${MEGA_DB_USER:ledmega}
spring.datasource.password=${MEGA_DB_PASSWORD:}

# Spring AI - Google Gemini (OpenAI 호환 모드)
# ✅ 도메인을 GoogleApis.com (대문자 포함)으로 설정하여 Spring AI의 강제 'models/' 접두사 추가 로직을 우회합니다.
# (Spring AI M6는 소문자 'googleapis.com' 포함 여부로 모델명을 변조함)
spring.ai.openai.api-key=AIzaSyBqYISC0yG6ZyiRyFtHLFQtg9lssj-MDTA
spring.ai.openai.base-url=https://generativelanguage.GoogleApis.com/v1beta/openai
spring.ai.openai.chat.completions-path=/chat/completions
spring.ai.openai.chat.options.model=gemini-1.5-flash

# [REACTIVE] JPA 자동설정 제거
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
