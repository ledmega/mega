spring.application.name=mega

# 리버스 프록시(nginx) 뒤에서 X-Forwarded-* 헤더 신뢰
# framework: Spring ForwardedHeaderFilter 사용 → 포트 포함 리다이렉트 URL 정상 생성
server.forward-headers-strategy=framework

# MariaDB 데이터베이스 연결 설정
spring.datasource.url=${MEGA_DB_URL:jdbc:mariadb://localhost:3306/ledmega?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=utf8mb4&serverTimezone=Asia/Seoul}
spring.datasource.username=${MEGA_DB_USER:ledmega}
spring.datasource.password=${MEGA_DB_PASSWORD:}
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

# JPA/Hibernate 설정
# ddl-auto는 DatabaseInitializer에서 수동으로 관리하므로 none으로 설정
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.connection.characterEncoding=utf8mb4
spring.jpa.properties.hibernate.connection.useUnicode=true
