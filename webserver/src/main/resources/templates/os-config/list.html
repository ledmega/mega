<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OS 모니터링 관리 - MEGA</title>
    <!-- Modern Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        :root {
            --primary: #6366f1;
            --primary-gradient: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            --secondary-gradient: linear-gradient(135deg, #3b82f6 0%, #2dd4bf 100%);
            --bg-color: #f8fafc;
            --card-bg: rgba(255, 255, 255, 0.8);
            --text-main: #1e293b;
            --text-sub: #64748b;
            --glass-border: rgba(255, 255, 255, 0.3);
            --glass-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.07);
        }

        body {
            font-family: 'Pretendard', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            overflow-x: hidden;
            background-image: 
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.05) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(45, 212, 191, 0.05) 0px, transparent 50%);
        }

        /* Navbar Style */
        .navbar {
            background: rgba(255, 255, 255, 0.7) !important;
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--glass-border);
            padding: 1rem 2rem;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .navbar-brand {
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
            font-size: 1.6rem;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Page Layout */
        .page-header {
            padding: 40px 0;
            background: var(--primary-gradient);
            color: white;
            border-radius: 0 0 40px 40px;
            margin-bottom: 40px;
            box-shadow: var(--glass-shadow);
        }

        .container {
            max-width: 1200px;
        }

        /* Glass Cards */
        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            box-shadow: var(--glass-shadow);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
            height: 100%;
        }

        .glass-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 40px 0 rgba(31, 38, 135, 0.12);
        }

        /* Table Style */
        .table {
            margin-bottom: 0;
        }

        .table thead th {
            background: rgba(99, 102, 241, 0.05);
            border-bottom: none;
            color: var(--text-sub);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 20px;
        }

        .table tbody td {
            padding: 20px;
            vertical-align: middle;
            border-color: rgba(0, 0, 0, 0.03);
            font-size: 0.95rem;
        }

        /* Status Badges */
        .badge-custom {
            padding: 6px 14px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 0.8rem;
        }

        .badge-online { background: rgba(34, 197, 94, 0.1); color: #16a34a; }
        .badge-offline { background: rgba(239, 68, 68, 0.1); color: #dc2626; }

        /* Icon Frames */
        .icon-frame {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 15px;
            font-size: 1.2rem;
        }

        .icon-cpu { background: rgba(99, 102, 241, 0.1); color: #6366f1; }
        .icon-mem { background: rgba(139, 92, 246, 0.1); color: #8b5cf6; }
        .icon-disk { background: rgba(59, 130, 246, 0.1); color: #3b82f6; }
        .icon-proc { background: rgba(244, 63, 94, 0.1); color: #f43f5e; }

        /* Form Controls */
        .form-select, .form-control {
            border-radius: 12px;
            border: 1px solid rgba(0, 0, 0, 0.08);
            padding: 10px 15px;
            font-size: 0.9rem;
        }

        .form-select:focus, .form-control:focus {
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
            border-color: var(--primary);
        }

        /* Action Buttons */
        .btn-modern {
            padding: 10px 24px;
            border-radius: 14px;
            font-weight: 600;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary-modern {
            background: var(--primary-gradient);
            border: none;
            color: white;
        }

        .btn-primary-modern:hover {
            transform: scale(1.02);
            filter: brightness(1.1);
            color: white;
        }

        .btn-outline-modern {
            background: white;
            border: 1px solid rgba(0, 0, 0, 0.1);
            color: var(--text-main);
        }

        .btn-outline-modern:hover {
            background: #f8fafc;
            border-color: var(--primary);
            color: var(--primary);
        }

        /* Modal Customization */
        .modal-content {
            border-radius: 28px;
            border: none;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }

        .modal-header {
            background: var(--primary-gradient);
            color: white;
            padding: 25px 30px;
            border: none;
        }

        .modal-body {
            padding: 30px;
        }

        /* Switch Style */
        .form-switch .form-check-input {
            width: 3rem;
            height: 1.5rem;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-light">
        <div class="container-fluid">
            <a class="navbar-brand" href="/dashboard">MEGA</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item">
                        <a class="nav-link px-3" href="/dashboard"><i class="fas fa-chart-line me-1"></i> 대시보드</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link px-3 active" href="/os-configs"><i class="fas fa-server me-1"></i> OS 설정</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link px-3" href="/services"><i class="fas fa-cubes me-1"></i> 서비스 설정</a>
                    </li>
                    <li class="nav-item ms-lg-3">
                        <span class="badge bg-light text-dark p-2" th:text="${username}">User</span>
                        <form th:action="@{/logout}" method="post" class="d-inline">
                            <button type="submit" class="btn btn-sm btn-link text-muted" style="text-decoration:none;">로그아웃</button>
                        </form>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Header -->
    <header class="page-header text-center">
        <div class="container">
            <h1 class="display-5 fw-bold mb-2">OS 모니터링 관리</h1>
            <p class="lead opacity-75">에이전트별 OS 자원 수집 정책을 동적으로 관리하세요</p>
        </div>
    </header>

    <main class="container mb-5">
        <div class="row g-4">
            <!-- Sidebar / Settings -->
            <div class="col-lg-4">
                <div class="glass-card p-4">
                    <h5 class="fw-bold mb-4"><i class="fas fa-filter me-2 text-primary"></i> 설정 추가 / 필터</h5>
                    <form id="configForm">
                        <div class="mb-3">
                            <label class="form-label text-sub small fw-bold">에이전트 선택</label>
                            <select class="form-select" id="agentSelect" name="agentId">
                                <option value="">공통 설정 (모든 에이전트)</option>
                                <option th:each="agent : ${agents}" th:value="${agent.id}" th:text="|${agent.name} (${agent.hostname})|"></option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-sub small fw-bold">메트릭 타입</label>
                            <select class="form-select" id="metricType" name="metricType" required>
                                <option value="CPU">CPU Stat</option>
                                <option value="MEMORY">Memory Info</option>
                                <option value="DISK">Disk Usage</option>
                                <option value="NETWORK">Network Traffic</option>
                                <option value="PROCESS">Process Top</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-sub small fw-bold">표시 명칭</label>
                            <input type="text" class="form-control" id="metricName" name="metricName" placeholder="예: CPU 사용량" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label text-sub small fw-bold">수집 주기 (초)</label>
                            <div class="d-flex align-items-center gap-3">
                                <input type="range" class="form-range" id="intervalRange" min="5" max="3600" step="5" value="60">
                                <span id="intervalValue" class="fw-bold text-primary" style="min-width: 45px;">60s</span>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary-modern w-100 py-3">
                            <i class="fas fa-plus me-2"></i> 설정 저장하기
                        </button>
                    </form>
                </div>

                <div class="glass-card p-4 mt-4 bg-primary text-white" style="border:none;">
                    <h6 class="fw-bold"><i class="fas fa-info-circle me-2"></i> 에이전트 반영 안내</h6>
                    <p class="small mb-0 opacity-75">설정 변경 시 에이전트가 최대 60초 이내에 새로운 정책을 Pull 하여 즉시 반영합니다. 프로세스 재시작이 필요 없습니다.</p>
                </div>
            </div>

            <!-- Main Content / List -->
            <div class="col-lg-8">
                <div class="glass-card">
                    <div class="p-4 border-bottom d-flex justify-content-between align-items-center bg-white bg-opacity-50">
                        <h5 class="fw-bold mb-0">활성 설정 목록</h5>
                        <div class="d-flex gap-2">
                            <button class="btn btn-sm btn-outline-modern" onclick="location.reload()"><i class="fas fa-sync-alt"></i></button>
                        </div>
                    </div>
                    
                    <div class="table-responsive">
                        <table class="table align-middle">
                            <thead>
                                <tr>
                                    <th>항목 명칭</th>
                                    <th>적용 대상</th>
                                    <th>수집 주기</th>
                                    <th>대시보드</th>
                                    <th>상태</th>
                                    <th>관리</th>
                                </tr>
                            </thead>
                            <tbody id="configTableBody">
                                <!-- AJAX or Thymeleaf iteration -->
                                <tr th:each="config : ${commonConfigs}">
                                    <td>
                                        <div class="d-flex align-items-center">
                                            <div class="icon-frame" th:classappend="|icon-${config.metricType.toLowerCase()}|">
                                                <i th:class="${config.metricType == 'CPU' ? 'fas fa-microchip' : 
                                                            (config.metricType == 'MEMORY' ? 'fas fa-memory' : 
                                                            (config.metricType == 'DISK' ? 'fas fa-hdd' : 'fas fa-tasks'))}"></i>
                                            </div>
                                            <div>
                                                <div class="fw-bold" th:text="${config.metricName}">CPU</div>
                                                <div class="text-sub small" th:text="${config.metricType}">TYPE</div>
                                            </div>
                                        </div>
                                    </td>
                                    <td><span class="badge bg-secondary bg-opacity-10 text-secondary" style="font-size: 0.75rem;">모든 에이전트</span></td>
                                    <td><span class="fw-bold" th:text="|${config.intervalSeconds}s|">60s</span></td>
                                    <td>
                                        <div class="form-check form-switch m-0">
                                            <input class="form-check-input" type="checkbox" th:checked="${config.dashboardYn == 'Y'}" disabled>
                                        </div>
                                    </td>
                                    <td><span class="badge badge-custom badge-online">ACTIVE</span></td>
                                    <td>
                                        <div class="btn-group">
                                            <button class="btn btn-sm btn-outline-light text-dark border-0 edit-btn" th:data-id="${config.configId}">
                                                <i class="fas fa-edit"></i>
                                            </button>
                                            <button class="btn btn-sm btn-outline-light text-danger border-0 delete-btn" th:data-id="${config.configId}">
                                                <i class="fas fa-trash"></i>
                                            </button>
                                        </div>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                    
                    <div id="noDataRow" class="text-center py-5 d-none">
                        <i class="fas fa-folder-open fa-3x text-muted mb-3"></i>
                        <p class="text-muted">설정된 항목이 없습니다.</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    
    <script>
        $(document).ready(function() {
            // Interval range display
            $('#intervalRange').on('input', function() {
                $('#intervalValue').text($(this).val() + 's');
            });

            // Load configurations (Initial)
            loadConfigs();

            // Form Submit
            $('#configForm').on('submit', function(e) {
                e.preventDefault();
                
                const data = {
                    agentId: $('#agentSelect').val() || null,
                    metricType: $('#metricType').val(),
                    metricName: $('#metricName').val(),
                    intervalSeconds: parseInt($('#intervalRange').val()),
                    collectYn: 'Y',
                    dashboardYn: 'Y',
                    enabled: true
                };

                $.ajax({
                    url: '/api/os-configs',
                    type: 'POST',
                    contentType: 'application/json',
                    data: JSON.stringify(data),
                    success: function() {
                        alert('설정이 저장되었습니다.');
                        $('#configForm')[0].reset();
                        $('#intervalValue').text('60s');
                        loadConfigs();
                    },
                    error: function() {
                        alert('저장 중 오류가 발생했습니다.');
                    }
                });
            });

            // Delete action
            $(document).on('click', '.delete-btn', function() {
                const id = $(this).data('id');
                if(confirm('이 설정을 비활성화 하시겠습니까?')) {
                    $.ajax({
                        url: '/api/os-configs/' + id,
                        type: 'DELETE',
                        success: function() {
                            loadConfigs();
                        }
                    });
                }
            });
        });

        function loadConfigs() {
            const agentId = $('#agentSelect').val();
            const url = agentId ? '/api/os-configs/agent/' + agentId : '/api/os-configs/common';
            
            $.get(url, function(data) {
                const tbody = $('#configTableBody');
                tbody.empty();
                
                if(data.length === 0) {
                    $('#noDataRow').removeClass('d-none');
                    return;
                }
                
                $('#noDataRow').addClass('d-none');
                
                data.forEach(config => {
                    const row = `
                        <tr>
                            <td>
                                <div class="d-flex align-items-center">
                                    <div class="icon-frame icon-${config.metricType.toLowerCase()}">
                                        <i class="${getIcon(config.metricType)}"></i>
                                    </div>
                                    <div>
                                        <div class="fw-bold">${config.metricName}</div>
                                        <div class="text-sub small">${config.metricType}</div>
                                    </div>
                                </div>
                            </td>
                            <td><span class="badge bg-secondary bg-opacity-10 text-secondary" style="font-size: 0.75rem;">
                                ${config.agentId ? '특정 에이전트' : '모든 에이전트'}
                            </span></td>
                            <td><span class="fw-bold">${config.intervalSeconds}s</span></td>
                            <td>
                                <div class="form-check form-switch m-0">
                                    <input class="form-check-input" type="checkbox" ${config.dashboardYn === 'Y' ? 'checked' : ''} disabled>
                                </div>
                            </td>
                            <td><span class="badge badge-custom badge-online">ACTIVE</span></td>
                            <td>
                                <div class="btn-group">
                                    <button class="btn btn-sm btn-outline-light text-danger border-0 delete-btn" data-id="${config.configId}">
                                        <i class="fas fa-trash"></i>
                                    </button>
                                </div>
                            </td>
                        </tr>
                    `;
                    tbody.append(row);
                });
            });
        }

        function getIcon(type) {
            switch(type) {
                case 'CPU': return 'fas fa-microchip';
                case 'MEMORY': return 'fas fa-memory';
                case 'DISK': return 'fas fa-hdd';
                case 'NETWORK': return 'fas fa-network-wired';
                case 'PROCESS': return 'fas fa-tasks';
                default: return 'fas fa-cube';
            }
        }
    </script>
</body>
</html>
